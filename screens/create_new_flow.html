<body class="font-display bg-background-light text-slate-900 antialiased h-full">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto shadow-sm overflow-x-hidden bg-white">

</button>
<h2 class="text-slate-900 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">New Flow</h2>

<!-- Main Content -->
<main class="flex-1 overflow-y-auto pb-24">
<h1 class="text-primary text-3xl font-extrabold leading-tight px-6 text-center pb-6 pt-8 tracking-tight">How would you like to start?</h1>
<div class="flex flex-col gap-6 p-6">
<!-- Option 1: Template -->
<button class="flex flex-col text-left group transition-all active:scale-[0.98]">
<div class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-6 flex flex-col items-center justify-center gap-4 group-hover:border-emerald group-hover:shadow-md transition-all h-48 relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-emerald-light/30 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="w-16 h-16 rounded-full bg-emerald/10 text-emerald flex items-center justify-center relative z-10 group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-4xl">dashboard_customize</span>
</div>
</div>
<div class="pt-4 text-center px-2">
<p class="text-slate-900 text-lg font-semibold leading-normal mb-1">Use Template</p>
<p class="text-slate-500 text-sm font-normal leading-relaxed">Start with pre-set rules for common spending scenarios</p>
</div>
</button>
<!-- Option 2: Custom -->
<button class="flex flex-col text-left group transition-all active:scale-[0.98]">
<div class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-6 flex flex-col items-center justify-center gap-4 group-hover:border-primary group-hover:shadow-md transition-all h-48 relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="w-16 h-16 rounded-full bg-primary/10 text-primary flex items-center justify-center relative z-10 group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-4xl">magic_button</span>
</div>
</div>
<div class="pt-4 text-center px-2">
<p class="text-slate-900 text-lg font-semibold leading-normal mb-1">Create Custom Flow</p>
<p class="text-slate-500 text-sm font-normal leading-relaxed">Build your own rules and limits from scratch</p>
</div>
</button>
</div>
</main>
