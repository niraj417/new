workflows:
  android-release:
    name: Android Release APK (Manual Signing)
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: latest
      java: 21
      groups:
        - firebase_config
      vars:
        PACKAGE_NAME: com.flowpay.app
        # ── Manual Keystore Vars (Set these in Codemagic UI) ────────────────
        # FDC_KEYSTORE_BASE64  ← Paste the base64 string I gave you here
        # FDC_KEYSTORE_PASSWORD ← flowpay_password
        # FDC_KEY_ALIAS        ← flowpay_alias
        # FDC_KEY_PASSWORD    ← flowpay_password

    scripts:
      - name: Create .env from Codemagic environment variables
        working_directory: app
        script: |
          cat > .env <<EOF
          VITE_FIREBASE_API_KEY=$VITE_FIREBASE_API_KEY
          VITE_FIREBASE_AUTH_DOMAIN=$VITE_FIREBASE_AUTH_DOMAIN
          VITE_FIREBASE_PROJECT_ID=$VITE_FIREBASE_PROJECT_ID
          VITE_FIREBASE_STORAGE_BUCKET=$VITE_FIREBASE_STORAGE_BUCKET
          VITE_FIREBASE_MESSAGING_SENDER_ID=$VITE_FIREBASE_MESSAGING_SENDER_ID
          VITE_FIREBASE_APP_ID=$VITE_FIREBASE_APP_ID
          EOF

      - name: Decode google-services.json
        working_directory: app/android/app
        script: echo "$GOOGLE_SERVICES_JSON" | base64 --decode > google-services.json

      - name: Decode Keystore
        working_directory: app/android/app
        script: echo "$FDC_KEYSTORE_BASE64" | base64 --decode > flowpay.keystore

      - name: Install npm dependencies
        working_directory: app
        script: npm ci

      - name: Build web assets
        working_directory: app
        script: npm run build

      - name: Sync Capacitor Android
        working_directory: app
        script: npx cap sync android

      - name: Build Android Release APK
        working_directory: app/android
        script: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="flowpay.keystore" \
            -Pandroid.injected.signing.store.password="$FDC_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$FDC_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$FDC_KEY_PASSWORD"

    artifacts:
      - app/android/app/build/outputs/**/*.apk
      - app/android/app/build/outputs/**/mapping.txt

    publishing:
      email:
        recipients:
          - kingniraj417@gmail.com
        notify:
          success: true
          failure: true

  android-debug:
    name: Android Debug APK
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: latest
      java: 21
      groups:
        - firebase_config
      vars:
        PACKAGE_NAME: com.flowpay.app

    scripts:
      - name: Create .env from Codemagic environment variables
        working_directory: app
        script: |
          cat > .env <<EOF
          VITE_FIREBASE_API_KEY=$VITE_FIREBASE_API_KEY
          VITE_FIREBASE_AUTH_DOMAIN=$VITE_FIREBASE_AUTH_DOMAIN
          VITE_FIREBASE_PROJECT_ID=$VITE_FIREBASE_PROJECT_ID
          VITE_FIREBASE_STORAGE_BUCKET=$VITE_FIREBASE_STORAGE_BUCKET
          VITE_FIREBASE_MESSAGING_SENDER_ID=$VITE_FIREBASE_MESSAGING_SENDER_ID
          VITE_FIREBASE_APP_ID=$VITE_FIREBASE_APP_ID
          EOF

      - name: Decode google-services.json
        working_directory: app/android/app
        script: echo "$GOOGLE_SERVICES_JSON" | base64 --decode > google-services.json

      - name: Install npm dependencies
        working_directory: app
        script: npm ci

      - name: Build web assets
        working_directory: app
        script: npm run build

      - name: Sync Capacitor Android
        working_directory: app
        script: npx cap sync android

      - name: Build Android Debug APK
        working_directory: app/android
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - app/android/app/build/outputs/**/*.apk
