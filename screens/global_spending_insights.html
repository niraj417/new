<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Global Spending Insights</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0a243e",
                        "background-light": "#f6f7f8",
                        "background-dark": "#121920",
                        "emerald-green": "#10b981",
                        "soft-blue": "#60a5fa"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen pb-20">
<!-- Header -->
<div class="sticky top-0 z-10 flex items-center justify-between px-4 py-4 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="text-lg font-bold">Global Insights</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 transition-colors">
<span class="material-symbols-outlined text-2xl">more_horiz</span>
</button>
</div>
<main class="p-4 space-y-6">
<!-- Summary Cards -->
<div class="grid grid-cols-2 gap-4">
<div class="bg-white dark:bg-slate-800 rounded-xl p-5 shadow-sm border border-slate-100 dark:border-slate-700">
<p class="text-sm font-medium text-slate-500 dark:text-slate-400 mb-1">Total Spent</p>
<p class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-2">$4,250.00</p>
<div class="flex items-center text-emerald-green text-sm font-medium">
<span class="material-symbols-outlined text-sm mr-1">trending_up</span>
<span>+5.2%</span>
</div>
</div>
<div class="bg-white dark:bg-slate-800 rounded-xl p-5 shadow-sm border border-slate-100 dark:border-slate-700">
<p class="text-sm font-medium text-slate-500 dark:text-slate-400 mb-1">Active Flows</p>
<p class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-2">12</p>
<div class="flex items-center text-red-500 text-sm font-medium">
<span class="material-symbols-outlined text-sm mr-1">trending_down</span>
<span>-1.0%</span>
</div>
</div>
</div>
<!-- Spend by Category (Donut Chart representation) -->
<div class="bg-white dark:bg-slate-800 rounded-xl p-5 shadow-sm border border-slate-100 dark:border-slate-700">
<h2 class="text-lg font-bold mb-4">Spend by Category</h2>
<div class="flex flex-col items-center mb-6">
<!-- CSS Donut Chart -->
<div class="relative w-48 h-48 rounded-full flex items-center justify-center" style="background: conic-gradient(
                        #10b981 0% 35%, 
                        #60a5fa 35% 65%, 
                        #f59e0b 65% 85%, 
                        #8b5cf6 85% 100%
                     );">
<!-- Inner circle to make it a donut -->
<div class="absolute w-32 h-32 bg-white dark:bg-slate-800 rounded-full flex flex-col items-center justify-center">
<span class="text-xs text-slate-500 dark:text-slate-400 font-medium">Total</span>
<span class="text-xl font-bold">$4,250</span>
</div>
</div>
</div>
<!-- Legend -->
<div class="grid grid-cols-2 gap-y-3 gap-x-4">
<div class="flex items-center justify-between">
<div class="flex items-center">
<div class="w-3 h-3 rounded-full bg-emerald-green mr-2"></div>
<span class="text-sm font-medium">Food</span>
</div>
<span class="text-sm font-bold">35%</span>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center">
<div class="w-3 h-3 rounded-full bg-soft-blue mr-2"></div>
<span class="text-sm font-medium">Transport</span>
</div>
<span class="text-sm font-bold">30%</span>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center">
<div class="w-3 h-3 rounded-full bg-amber-500 mr-2"></div>
<span class="text-sm font-medium">Shopping</span>
</div>
<span class="text-sm font-bold">20%</span>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center">
<div class="w-3 h-3 rounded-full bg-violet-500 mr-2"></div>
<span class="text-sm font-medium">Utilities</span>
</div>
<span class="text-sm font-bold">15%</span>
</div>
</div>
</div>
<!-- Daily Spending Trend (Bar Chart representation) -->
<div class="bg-white dark:bg-slate-800 rounded-xl p-5 shadow-sm border border-slate-100 dark:border-slate-700">
<div class="flex items-center justify-between mb-6">
<h2 class="text-lg font-bold">Daily Trend</h2>
<select class="bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-sm rounded-lg px-2 py-1 focus:ring-primary focus:border-primary">
<option>This Week</option>
<option>Last Week</option>
</select>
</div>
<div class="h-48 flex items-end justify-between gap-2 px-1 pb-6 relative">
<!-- Y-axis lines -->
<div class="absolute inset-0 flex flex-col justify-between pb-6 opacity-10 pointer-events-none">
<div class="w-full border-t border-slate-900 dark:border-slate-100"></div>
<div class="w-full border-t border-slate-900 dark:border-slate-100"></div>
<div class="w-full border-t border-slate-900 dark:border-slate-100"></div>
<div class="w-full border-t border-slate-900 dark:border-slate-100"></div>
</div>
<!-- Bars -->
<div class="flex-1 flex flex-col items-center justify-end h-full z-10 group relative">
<div class="w-full max-w-[24px] bg-primary/40 dark:bg-primary/60 rounded-t-md transition-all h-[40%]"></div>
<span class="absolute -bottom-6 text-xs text-slate-500 dark:text-slate-400">Mon</span>
</div>
<div class="flex-1 flex flex-col items-center justify-end h-full z-10 group relative">
<div class="w-full max-w-[24px] bg-primary/40 dark:bg-primary/60 rounded-t-md transition-all h-[65%]"></div>
<span class="absolute -bottom-6 text-xs text-slate-500 dark:text-slate-400">Tue</span>
</div>
<div class="flex-1 flex flex-col items-center justify-end h-full z-10 group relative">
<div class="w-full max-w-[24px] bg-emerald-green rounded-t-md transition-all h-[85%]"></div>
<span class="absolute -bottom-6 text-xs font-bold text-slate-800 dark:text-slate-200">Wed</span>
</div>
<div class="flex-1 flex flex-col items-center justify-end h-full z-10 group relative">
<div class="w-full max-w-[24px] bg-primary/40 dark:bg-primary/60 rounded-t-md transition-all h-[30%]"></div>
<span class="absolute -bottom-6 text-xs text-slate-500 dark:text-slate-400">Thu</span>
</div>
<div class="flex-1 flex flex-col items-center justify-end h-full z-10 group relative">
<div class="w-full max-w-[24px] bg-primary/40 dark:bg-primary/60 rounded-t-md transition-all h-[50%]"></div>
<span class="absolute -bottom-6 text-xs text-slate-500 dark:text-slate-400">Fri</span>
</div>
<div class="flex-1 flex flex-col items-center justify-end h-full z-10 group relative">
<div class="w-full max-w-[24px] bg-primary/40 dark:bg-primary/60 rounded-t-md transition-all h-[20%]"></div>
<span class="absolute -bottom-6 text-xs text-slate-500 dark:text-slate-400">Sat</span>
</div>
<div class="flex-1 flex flex-col items-center justify-end h-full z-10 group relative">
<div class="w-full max-w-[24px] bg-primary/40 dark:bg-primary/60 rounded-t-md transition-all h-[15%]"></div>
<span class="absolute -bottom-6 text-xs text-slate-500 dark:text-slate-400">Sun</span>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 w-full bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 pb-safe pt-2 px-4 z-50">
<div class="flex justify-between items-center max-w-md mx-auto">
<a class="flex flex-col items-center p-2 text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl mb-1">home</span>
<span class="text-[10px] font-medium">Home</span>
</a>
<a class="flex flex-col items-center p-2 text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl mb-1">swap_horiz</span>
<span class="text-[10px] font-medium">Flows</span>
</a>
<a class="flex flex-col items-center p-2 text-primary dark:text-primary transition-colors relative" href="#">
<span class="material-symbols-outlined text-2xl mb-1" style="font-variation-settings: 'FILL' 1;">bar_chart</span>
<span class="text-[10px] font-medium">Insights</span>
</a>
<a class="flex flex-col items-center p-2 text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl mb-1">settings</span>
<span class="text-[10px] font-medium">Settings</span>
</a>
</div>
</nav>
<style>
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 1rem);
        }
    </style>
</body></html>
