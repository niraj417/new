workflows:
  android-release:
    name: Android Release APK
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: latest
      java: 21
      # ── Firebase env vars (set in Codemagic → Environment variables) ───────
      # Add these as "Secure" variables in your Codemagic app settings:
      #   VITE_FIREBASE_API_KEY
      #   VITE_FIREBASE_AUTH_DOMAIN
      #   VITE_FIREBASE_PROJECT_ID
      #   VITE_FIREBASE_STORAGE_BUCKET
      #   VITE_FIREBASE_MESSAGING_SENDER_ID
      #   VITE_FIREBASE_APP_ID
      #   GOOGLE_SERVICES_JSON   ← base64-encoded contents of google-services.json
      groups:
        - firebase_config     # Group name in Codemagic containing the vars above
      vars:
        PACKAGE_NAME: com.flowpay.app

      # ── Android code signing ──────────────────────────────────────────────
      android_signing:
        - flowpay_keystore    # Keystore name configured in Codemagic Settings

    scripts:
      # 1. Write .env for Vite build
      - name: Create .env from Codemagic environment variables
        working_directory: app
        script: |
          cat > .env <<EOF
          VITE_FIREBASE_API_KEY=$VITE_FIREBASE_API_KEY
          VITE_FIREBASE_AUTH_DOMAIN=$VITE_FIREBASE_AUTH_DOMAIN
          VITE_FIREBASE_PROJECT_ID=$VITE_FIREBASE_PROJECT_ID
          VITE_FIREBASE_STORAGE_BUCKET=$VITE_FIREBASE_STORAGE_BUCKET
          VITE_FIREBASE_MESSAGING_SENDER_ID=$VITE_FIREBASE_MESSAGING_SENDER_ID
          VITE_FIREBASE_APP_ID=$VITE_FIREBASE_APP_ID
          EOF

      # 2. Decode google-services.json from base64 env var
      - name: Decode google-services.json
        working_directory: app/android/app
        script: echo "$GOOGLE_SERVICES_JSON" | base64 --decode > google-services.json

      # 3. Install npm dependencies
      - name: Install npm dependencies
        working_directory: app
        script: npm ci

      # 4. Build Vite web assets
      - name: Build web assets
        working_directory: app
        script: npm run build

      # 5. Sync Capacitor Android
      - name: Sync Capacitor Android
        working_directory: app
        script: npx cap sync android

      # 6. Print signing keystore SHA-1 (for Firebase Console)
      - name: Print keystore SHA-1 (add this to Firebase Console)
        working_directory: app/android
        script: |
          keytool -list -v \
            -keystore "$CM_KEYSTORE_PATH" \
            -alias "$CM_KEY_ALIAS" \
            -storepass "$CM_KEYSTORE_PASSWORD" \
            -keypass "$CM_KEY_PASSWORD" 2>/dev/null | grep "SHA1"

      # 7. Build release APK
      - name: Build Android Release APK
        working_directory: app/android
        script: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$CM_KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$CM_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$CM_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$CM_KEY_PASSWORD"

    artifacts:
      - app/android/app/build/outputs/**/*.apk
      - app/android/app/build/outputs/**/mapping.txt

    publishing:
      email:
        recipients:
          - kingniraj417@gmail.com
        notify:
          success: true
          failure: true

  # ── Debug build (fast, no signing needed) ─────────────────────────────────
  android-debug:
    name: Android Debug APK
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: latest
      java: 21
      groups:
        - firebase_config
      vars:
        PACKAGE_NAME: com.flowpay.app

    scripts:
      - name: Create .env from Codemagic environment variables
        working_directory: app
        script: |
          cat > .env <<EOF
          VITE_FIREBASE_API_KEY=$VITE_FIREBASE_API_KEY
          VITE_FIREBASE_AUTH_DOMAIN=$VITE_FIREBASE_AUTH_DOMAIN
          VITE_FIREBASE_PROJECT_ID=$VITE_FIREBASE_PROJECT_ID
          VITE_FIREBASE_STORAGE_BUCKET=$VITE_FIREBASE_STORAGE_BUCKET
          VITE_FIREBASE_MESSAGING_SENDER_ID=$VITE_FIREBASE_MESSAGING_SENDER_ID
          VITE_FIREBASE_APP_ID=$VITE_FIREBASE_APP_ID
          EOF

      - name: Decode google-services.json
        working_directory: app/android/app
        script: echo "$GOOGLE_SERVICES_JSON" | base64 --decode > google-services.json

      - name: Install npm dependencies
        working_directory: app
        script: npm ci

      - name: Build web assets
        working_directory: app
        script: npm run build

      - name: Sync Capacitor Android
        working_directory: app
        script: npx cap sync android

      - name: Print debug keystore SHA-1 (add this to Firebase Console)
        working_directory: app/android
        script: |
          keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android 2>/dev/null | grep "SHA1" || echo "Debug keystore not found"

      - name: Build Android Debug APK
        working_directory: app/android
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - app/android/app/build/outputs/**/*.apk
